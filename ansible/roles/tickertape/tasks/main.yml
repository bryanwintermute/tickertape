---
# tickertape: deploy the web UI + print worker as systemd services.
#
# Runs after printer-host (which provides /dev/rongta-receipt + plugdev).
# Pushes the repo working copy to the target via rsync, renders parameterized
# units, then restarts the services so the freshly-synced code goes live.

- name: Sanity checks
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == 'Debian'
      - tickertape_user | length > 0
      - tickertape_src_dir | length > 0
    fail_msg: >-
      tickertape requires a Debian-family target and a resolvable
      tickertape_user / tickertape_src_dir.

- name: Install apt packages
  ansible.builtin.apt:
    name: "{{ tickertape_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Ensure the deploy parent directory exists
  ansible.builtin.file:
    path: "{{ tickertape_dest | dirname }}"
    state: directory
    owner: "{{ tickertape_user }}"
    group: "{{ tickertape_user }}"
    mode: "0755"
  become: true

- name: Sync the tickertape repo to the target
  ansible.posix.synchronize:
    src: "{{ tickertape_src_dir }}/"
    dest: "{{ tickertape_dest }}/"
    delete: true
    rsync_opts: "{{ tickertape_rsync_excludes | map('regex_replace', '^', '--exclude=') | list }}"
  # synchronize runs from the controller over the existing SSH connection;
  # files land owned by the connecting user (tickertape_user). No become.

- name: Render systemd unit files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - tickertape.service
    - tickertape-worker.service
  become: true
  notify: Reload systemd

# Apply any unit-file change now (daemon-reload) so the restart below picks
# up the new unit, not the old one. Handlers otherwise run at end-of-play.
- name: Flush handlers (apply pending daemon-reload before restart)
  ansible.builtin.meta: flush_handlers

# Restart on EVERY deploy (not just when files change). server.py / worker.py
# are long-running Python processes that do NOT hot-reload, so a deploy that
# only syncs code would otherwise leave the *old* process serving stale code
# with no signal that a restart is needed. An unconditional restart is the
# reliable "make the deployed code live" step for a single-service homelab
# app; the worker persists its queue in SQLite and recovers on start, so the
# ~2s blip is harmless. Set tickertape_manage_services=false to skip.
- name: Enable and restart tickertape services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: restarted
  loop:
    - tickertape.service
    - tickertape-worker.service
  become: true
  when: tickertape_manage_services
