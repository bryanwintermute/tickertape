<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tickertape</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="fonts/outfit.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tickertape</h1>
            <p class="subtitle">Print to the physical inbox</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="echo">Markdown</button>
            <button class="tab-btn" data-tab="list">List</button>
            <button class="tab-btn" data-tab="inbox">Inbox</button>
            <button class="tab-btn" data-tab="history">History</button>
        </nav>

        <main>
            <!-- Echo Panel -->
            <section id="echo-panel" class="panel active">
                <form id="echo-form">
                    <div class="input-group">
                        <label for="echo-title">Title (Optional)</label>
                        <input type="text" id="echo-title" placeholder="A brief title...">
                    </div>
                    <div class="input-group">
                        <label for="echo-text">Message</label>
                        <textarea id="echo-text" rows="4" placeholder="Type a note or use Markdown (e.g. # Heading, **bold**, - list)..." required></textarea>
                    </div>
                    <div class="input-group">
                        <label class="checkbox-label"><input type="checkbox" id="echo-save" checked> Save to history</label>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="primary-btn" style="flex: 1;">Print Now</button>
                        <button type="button" class="secondary-btn" id="echo-inbox-btn" style="flex: 1;">Save to Inbox</button>
                    </div>
                </form>
            </section>

            <!-- List Panel -->
            <section id="list-panel" class="panel">
                <form id="list-form">
                    <div class="input-group">
                        <label for="list-title">List Title</label>
                        <input type="text" id="list-title" placeholder="e.g. Groceries" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Style</label>
                        <div class="radio-group">
                            <label><input type="radio" name="list-style" value="checkbox" checked> Checkboxes</label>
                            <label><input type="radio" name="list-style" value="bullet"> Bullets</label>
                            <label><input type="radio" name="list-style" value="numbered"> Numbered</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Items (one per line)
                            <select id="list-template-select" style="float: right; font-size: 0.8em; padding: 2px; border-radius: 4px; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);">
                                <option value="">-- Load Template --</option>
                                <option value="shopping">Shopping List</option>
                                <option value="morning">Morning Routine</option>
                            </select>
                        </label>
                        <textarea id="list-items" rows="6" placeholder="Milk&#10;Eggs&#10;Bread" required></textarea>
                    </div>
                    <div class="input-group">
                        <label class="checkbox-label"><input type="checkbox" id="list-save" checked> Save to history</label>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="primary-btn" style="flex: 1;">Print Now</button>
                        <button type="button" class="secondary-btn" id="list-inbox-btn" style="flex: 1;">Save to Inbox</button>
                    </div>
                </form>
            </section>

            <!-- Inbox Panel -->
            <section id="inbox-panel" class="panel">
                <div class="inbox-header">
                    <h2>Inbox</h2>
                    <button id="refresh-inbox" class="icon-btn" aria-label="Refresh">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                    </button>
                </div>
                <div id="inbox-list" class="inbox-list">
                    <p class="empty-state">Loading...</p>
                </div>
            </section>

            <!-- History Panel -->
            <section id="history-panel" class="panel">
                <div class="inbox-header">
                    <h2>History</h2>
                    <button id="refresh-history" class="icon-btn" aria-label="Refresh">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                    </button>
                </div>
                <div id="history-list" class="inbox-list">
                    <p class="empty-state">Loading...</p>
                </div>
            </section>
        </main>

        <!-- Toast Notification -->
        <div id="toast" class="toast">Job queued successfully!</div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
